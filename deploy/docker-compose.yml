services:
  mysql:
    image: mysql:8.0
    container_name: rule-engine-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: rule_engine
      MYSQL_USER: rule
      MYSQL_PASSWORD: rule123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-urule", "-prule123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rule-engine-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: rule-engine-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
      - "9848:9848"

  rule-engine-service:
    build:
      context: ..
      dockerfile: backend/rule-engine-service/rule-engine-start/Dockerfile
    container_name: rule-engine-service
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/rule_engine?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      MYSQL_USER: rule
      MYSQL_PASSWORD: rule123456
      REDIS_HOST: redis
      NACOS_ENABLED: "true"
      NACOS_SERVER: nacos:8848
      RULE_ENGINE_AES_KEY: 0123456789abcdef0123456789abcdef
      JWT_SECRET: mySecretKeyForJWTTokenGeneration2026!@#$%^&*()
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      EXPOSE_ACTUATOR: "true"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/rule-engine/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  rule-engine-ui:
    build:
      context: ..
      dockerfile: frontend/rule-engine-ui/Dockerfile
    container_name: rule-engine-ui
    ports:
      - "5173:80"
    depends_on:
      rule-engine-service:
        condition: service_healthy

volumes:
  mysql-data:
