apiVersion: apps/v1
kind: Deployment
metadata:
  name: approval-flow-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: approval-flow-service
  template:
    metadata:
      labels:
        app: approval-flow-service
    spec:
      containers:
        - name: approval-flow-service
          image: approval-flow-service:0.1.0
          ports:
            - containerPort: 8082
          env:
            - name: MYSQL_URL
              valueFrom:
                secretKeyRef:
                  name: rule-engine-secret
                  key: mysql-url
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: rule-engine-secret
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rule-engine-secret
                  key: mysql-password
            - name: JASYPT_ENCRYPTOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rule-engine-secret
                  key: config-enc-key
            - name: RULE_ENGINE_URL
              value: http://rule-engine-service:8080/rule-engine
            - name: APPROVAL_CALLBACK_SECRET
              valueFrom:
                secretKeyRef:
                  name: rule-engine-secret
                  key: approval-callback-secret
          readinessProbe:
            httpGet:
              path: /approval/actuator/health/readiness
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /approval/actuator/health/liveness
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: approval-flow-service
spec:
  selector:
    app: approval-flow-service
  ports:
    - port: 8082
      targetPort: 8082
