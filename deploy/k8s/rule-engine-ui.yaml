apiVersion: apps/v1
kind: Deployment
metadata:
  name: rule-engine-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rule-engine-ui
  template:
    metadata:
      labels:
        app: rule-engine-ui
    spec:
      containers:
        - name: rule-engine-ui
          image: rule-engine-ui:0.1.0
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: rule-engine-ui
spec:
  type: NodePort
  selector:
    app: rule-engine-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080

