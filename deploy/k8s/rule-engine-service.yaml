apiVersion: apps/v1
kind: Deployment
metadata:
  name: rule-engine-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rule-engine-service
  template:
    metadata:
      labels:
        app: rule-engine-service
    spec:
      containers:
        - name: rule-engine-service
          image: rule-engine-service:0.1.0
          ports:
            - containerPort: 8080
          env:
            - name: MYSQL_URL
              value: jdbc:mysql://mysql:3306/rule_engine?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: rule-engine-secret
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rule-engine-secret
                  key: mysql-password
            - name: RULE_ENGINE_AES_KEY
              valueFrom:
                secretKeyRef:
                  name: rule-engine-secret
                  key: aes-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rule-engine-secret
                  key: jwt-secret
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: rule-engine-secret
                  key: cors-allowed-origins
            - name: REDIS_HOST
              value: redis
          readinessProbe:
            httpGet:
              path: /rule-engine/actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /rule-engine/actuator/health/liveness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: rule-engine-service
spec:
  selector:
    app: rule-engine-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rule-engine-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rule-engine-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
