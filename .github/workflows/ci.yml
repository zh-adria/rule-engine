name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend (Java 17 + Maven)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: dev_2026
        ports: [3306:3306]
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run backend tests
        working-directory: backend/rule-engine-service
        run: mvn test -B
      - name: Run approval service tests
        working-directory: backend/approval-flow-service
        run: mvn test -B
      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco'
          retention-days: 14

  frontend-test:
    name: Frontend (Node.js + Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/rule-engine-ui/package-lock.json
      - name: Install dependencies
        working-directory: frontend/rule-engine-ui
        run: npm ci
      - name: Run tests
        working-directory: frontend/rule-engine-ui
        run: npx vitest run
      - name: Build
        working-directory: frontend/rule-engine-ui
        run: npx vite build
