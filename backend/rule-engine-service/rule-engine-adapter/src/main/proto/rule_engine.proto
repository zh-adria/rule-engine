syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.insurance.ruleengine.grpc";

service RuleEngineInternal {
  rpc ExecuteRule (ExecuteRuleRequest) returns (ExecuteRuleResponse);
}

message ExecuteRuleRequest {
  string trace_id = 1;
  string rule_code = 2;
  int32 version = 3;
  string scenario = 4;
  string facts_json = 5;
  string operator = 6;
}

message ExecuteRuleResponse {
  string trace_id = 1;
  string rule_code = 2;
  int32 version = 3;
  string decision = 4;
  string hit_rules_json = 5;
  string outputs_json = 6;
  int64 elapsed_ms = 7;
}

