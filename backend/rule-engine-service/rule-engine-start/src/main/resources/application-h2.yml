server:
  port: 8080
  servlet:
    context-path: /rule-engine

spring:
  application:
    name: rule-engine-service
  datasource:
    url: jdbc:h2:file:./data/rule_engine;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2.sql
  jpa:
    hibernate:
      ddl-auto: validate
    defer-datasource-initialization: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  redis:
    host: localhost
    port: 6379
  cloud:
    nacos:
      discovery:
        enabled: false

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

rule-engine:
  encryption-key: 0123456789abcdef0123456789abcdef
  execution:
    slow-threshold-ms: 10
    max-fired-rules: 1000
    timeout-ms: 3000
  jwt:
    secret: mySecretKeyForJWTTokenGeneration2026!@#$%^&*()
    expiration-seconds: 86400
  security:
    cors:
      allowed-origins: http://localhost:5173
    expose-actuator: true
    expose-h2-console: true
    expose-swagger: true
