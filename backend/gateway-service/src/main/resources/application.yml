server:
  port: 9000

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
        enabled: ${NACOS_ENABLED:false}
    gateway:
      # ---- Route definitions ----
      routes:
        # Approval flow service
        - id: approval-flow-service
          uri: ${APPROVAL_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/approval/**
          filters:
            - StripPrefix=0

        # Rule engine service
        - id: rule-engine-service
          uri: ${RULE_ENGINE_SERVICE_URI:http://localhost:8080}
          predicates:
            - Path=/rule-engine/**
          filters:
            - StripPrefix=0

      # CORS configuration at gateway level
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "${CORS_ALLOWED_ORIGINS:http://localhost:5173}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

# Auth validation config (public paths that skip auth)
gateway:
  auth:
    jwt-secret-key: ${SA_TOKEN_JWT_SECRET_KEY:}
  public-paths:
    - /rule-engine/api/v1/auth/login
    - /rule-engine/actuator/health
    - /approval/actuator/health
  # P3-external: API Key auth for service-to-service calls
  api-key:
    enabled: ${API_KEY_ENABLED:false}
    header: ${API_KEY_HEADER:X-Api-Key}
    keys: ${API_KEY_KEYS:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true
